version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: barbearia-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: rootpassword
      POSTGRES_DB: barbearia
    volumes:
      - db-data:/var/lib/postgresql/data
    restart: always

volumes:
  db-data:
